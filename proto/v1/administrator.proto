syntax = "proto3";

package beget.bereg.v1.administrator;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "bereg/proto/v1/structure.proto";

service AdministratorService {
    rpc makeChangeOrder(MakeChangeOrderRequest) returns (MakeChangeOrderResponse) {
        option (google.api.http) = {
			post: "/v1/bereg/administrator/orders/make"
			body: "*"
		};
    }

    rpc getChangeOrders(GetChangeOrdersRequest) returns (GetChangeOrdersResponse) {
        option (google.api.http) = {
			get: "/v1/bereg/administrator/orders"
		};
    }

    rpc cancelChangeOrder(CancelChangeOrderRequest) returns (CancelChangeOrderResponse) {
        option (google.api.http) = {
			patch: "/v1/bereg/administrator/orders/{id}/cancel"
		};
    }

    // Создание заявления на безбумажное переоформление доменов
    rpc createPaperlessOrder (CreatePaperlessOrderRequest) returns (CreatePaperlessOrderResponse) {
        option (google.api.http) = {
			post: "/v1/bereg/administrator/paperless"
			body: "*"
		};
    }

    rpc examineNormalization(ExamineNormalizationRequest) returns (ExamineNormalizationResponse) {
        option (google.api.http) = {
            post: "/v1/bereg/administrator/examineNormalization"
            body: "*"
        };
    }

    // Привязка учетной записи госуслуг к администратору домена
    rpc createEsiaBind(CreateEsiaBindRequest) returns (CreateEsiaBindResponse) {
        option (google.api.http) = {
            post: "/v1/bereg/administrator/esia"
            body: "*"
        };
    }

    // Обновление данных администратора через госуслуги
    rpc correction(CorrectionRequest) returns (CorrectionResponse) {
        option (google.api.http) = {
            post: "/v1/bereg/administrator/esia/correction"
            body: "*"
        };
    }

    // Инициирует подтверждение смены администратора
    rpc approveChangeOrder(ApproveChangeOrderRequest) returns (ApproveChangeOrderResponse) {
        option (google.api.http) = {
            patch: "/v1/bereg/administrator/orders/{id}/approve"
        };
    }
}

message MakeChangeOrderRequest {
    // Доменные имена, для которых необходимо создать заявки на редактирование персональных данных персоны
    repeated string fqdn = 1;

    // Новый администратор, на которого необходимо переоформить домены. Может быть пустым, если смена администратора домена происходит с подтверждением через ЕСИА.
    oneof administrator {
        // Физическое лицо
        beget.bereg.v1.structure.Administrator.PhysicalPerson physical_person = 2;

        // Юридическое лицо
        beget.bereg.v1.structure.Administrator.LegalEntity legal_entity = 3;
    }
}

message MakeChangeOrderResponse {
    message Success {
        // Заявка на смену персональных данных персоны
        ChangeAdministratorOrder change_administrator_order = 1;
        // Токен для подтверждения операции через ЕСИА
        string token = 2;
    }
    
    enum Error {
        // Внутренняя ошибка сервера
        INTERNAL_ERROR = 0;
        
        // Персоны для переданных FQDN различаются между собой
        DOMAIN_PERSONS_ARE_DIFFERENT = 1;

        // Уже есть активная заявка на смену админа
        ACTIVE_ORDER_ALREADY_EXISTS = 2;
    }
    
    oneof result {
        Success success = 1;
        Error error = 2;
    }
}

message GetChangeOrdersRequest {
    
}

message GetChangeOrdersResponse {
    message Success {
        // Все заявки на смену персональных данных персоны
        repeated ChangeAdministratorOrder change_administrator_order = 1;
    }

    enum Error {
        // Внутренняя ошибка сервера
        INTERNAL_ERROR = 0;
    }

    oneof result {
        Success success = 1;
        Error error = 2;
    }
}

message CancelChangeOrderRequest {
    // Идентификатор заявки на смену персональных данных персоны
    uint32 id = 1;
}

message CancelChangeOrderResponse {
    message Success {
        // Заявка на смену персональных данных персоны
        ChangeAdministratorOrder change_administrator_order = 1;
    }

    enum Error {
        // Внутренняя ошибка сервера
        INTERNAL_ERROR = 0;
    }

    oneof result {
        Success success = 1;
        Error error = 2;
    }
}

message ChangeAdministratorOrder {
    // Номер заявки на смену персональных данных персоны
    uint32 id = 1;
    
    // Доменные имена, для которых создан запрос на смену персональных данных персоны
    repeated string fqdn = 2;

    // Адрес, по которому доступно заявление, необходимое для подтверждения смены персональных данных персоны
    string application_form_link = 3;

    // Статус текущей заявки на смену персональных данных персоны
    oneof status {
        // Ожидает оформления
        Pending pending = 4;
        // Заявка отклонена
        Declined declined = 5;
        Approved approved = 6;
        // Заявка отменена
        Canceled canceled = 7;
        // Заявка выполнена
        Completed completed = 8;
        // Ожидается подтверждение смены персональных данных персоны новым администратором
        NewAdminPending new_admin_pending = 10;
        // Ожидается подтверждение смены персональных данных персоны текущим администратором
        CurrentAdminPending current_admin_pending = 11;
        // Срок действия заявки на смену персональных данных персоны истек
        Expired expired = 12;
    }
    
    message Declined {
        // Причина отказа в изменении персональных данных персоны
        string decline_reason = 1;
        
        // Дата рассмотрения заявки на смену персональных данных персоны
        google.protobuf.Timestamp examined_at = 2;
    }

    message Approved {
        // Дата рассмотрения заявки на смену персональных данных персоны
        google.protobuf.Timestamp examined_at = 1;
        
        // Ссылки на сканы документов, подтверждающих личность персоны
        repeated string application_link = 2;
    }
    
    message Pending {
        
    }
    
    message Canceled {
        
    }
    
    message Completed {
        
    }

    message NewAdminPending {
        // Токен для подтверждения операции через ЕСИА
        string token = 1;
    }

    message CurrentAdminPending {
        // Токен для подтверждения операции через ЕСИА
        string token = 1;
    }

    message Expired {
    }
    // Дата и время создания заявки на смену персональных данных персоны
    google.protobuf.Timestamp created_at = 9;

    // Новый администратор, на которого необходимо переоформить домены. Может быть пустым, если смена администратора домена происходит с подтверждением через ЕСИА.
    oneof administrator {
        // Физическое лицо
        beget.bereg.v1.structure.Administrator.PhysicalPerson physical_person = 13;

        // Юридическое лицо
        beget.bereg.v1.structure.Administrator.LegalEntity legal_entity = 14;
    }
}

message CreatePaperlessOrderRequest {
    string name = 1; // ФИО заявителя
    string phone = 2; // Номер телефона для отправки SMS
    string birthday = 3; // YYYY-MM-DD
    string identity_document_serial = 4; // Серия и номер паспорта
    map<string, string> identity_document_data = 5; // Когда и кем выдан паспорт
}

message CreatePaperlessOrderResponse {
    oneof result {
        Success success = 1;
        Error error = 2;
    }

    message Success {
        // Номер заявления на безбумажное переоформление
        uint32 id = 1;
        // Ссылка для скачивания заявления
        string application_form_link = 2;
    }

    message Error {
        Code code = 1;
        string message = 2;
        enum Code {
            _ = 0;
        }
    }
}

message ExamineNormalizationRequest {
    string hash_code = 1;
    bool is_correct = 2;
}

message ExamineNormalizationResponse {
    oneof result {
        Success success = 1;
        Error error = 2;
    }

    message Success {
    }

    message Error {
        string message = 1;
        ErrorCode code = 2;

        enum ErrorCode {
            _ = 0;
            NOT_FOUND = 1;
            ALREADY_EXAMINED = 2;
        }
    }
}

message CreateEsiaBindRequest {
    int32 domain_person_id = 1;
}

message CreateEsiaBindResponse {
    string token = 1 [deprecated=true];
    oneof result {
        Success success = 2;
        Error error = 3;
    }

    message Success {
        string token = 1;
    }

    message Error {
        string message = 1;
        ErrorCode code = 2;

        enum ErrorCode {
            _ = 0;
            ACTIVE_BIND_ALREADY_EXISTS = 1;
        }
    }
}

message CorrectionRequest {
    int32 domain_person_id = 1;
}

message CorrectionResponse {
    oneof result {
        Success success = 1;
        Error error = 2;
    }

    message Success {
        string token = 1;
    }

    message Error {
        string message = 1;
        ErrorCode code = 2;

        enum ErrorCode {
            _ = 0;
        }
    }
}

message ApproveChangeOrderRequest {
    // Идентификатор заявки на смену персональных данных персоны
    uint32 id = 1;
}

message ApproveChangeOrderResponse {
    message Success {
        // Заявка на смену персональных данных персоны
        ChangeAdministratorOrder change_administrator_order = 1;
    }

    enum Error {
        // Внутренняя ошибка сервера
        INTERNAL_ERROR = 0;
    }

    oneof result {
        Success success = 1;
        Error error = 2;
    }
}